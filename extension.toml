id            = "glide"
name          = "Glide"
description   = "Glide language support"
version       = "0.3.2"
schema_version = 1
authors       = ["Murillo Deolino <Murilinho145SG>"]
repository    = "https://github.com/glide-lang/Glide"
# Icon for the extension itself in Zed's UI. Per-file icons require a
# separate icon-theme extension at the moment; languages/glide/icon.svg is
# kept around for the day Zed exposes per-language icons.
icon_path     = "icon.png"

[language_servers.glide-lsp]
name      = "glide-lsp"
languages = ["Glide"]

[grammars.glide]
repository = "https://github.com/glide-lang/Glide"
commit     = "5354269b9d44f697d683c4ed0516300aac45236e"
path       = "glide-grammar"

[slash_commands.glide-routes]
description       = "List @route'd handlers in a Glide file"
requires_argument = true
