name = "Glide"
grammar = "glide"
path_suffixes = ["glide"]
line_comments = ["// "]
block_comment = ["/* ", " */"]
tab_size = 4
hard_tabs = false
autoclose_before = ";:.,=)]}"
word_characters = ["_"]

brackets = [
  { start = "{",  end = "}",  close = true,  newline = true },
  { start = "(",  end = ")",  close = true,  newline = false },
  { start = "[",  end = "]",  close = true,  newline = false },
  { start = "\"", end = "\"", close = true,  newline = false, not_in = ["string"] },
  { start = "'",  end = "'",  close = true,  newline = false, not_in = ["string"] },
]
