<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!--
    GLIDE — Sugar Glider Mark
    Top-down silhouette in flight. Single recognizable shape.
  -->

  <!-- Sombra/profundidade sutil (offset) -->
  <g transform="translate(3, 4)" opacity="0.12">
    <path d="M 128 56
             L 152 88
             L 220 104
             L 200 132
             L 156 140
             L 168 196
             L 128 216
             L 88 196
             L 100 140
             L 56 132
             L 36 104
             L 104 88
             Z"
          fill="#000"/>
  </g>

  <!-- Silhueta principal do glider planando (vista superior) -->
  <path d="M 128 56
           L 152 88
           L 220 104
           L 200 132
           L 156 140
           L 168 196
           L 128 216
           L 88 196
           L 100 140
           L 56 132
           L 36 104
           L 104 88
           Z"
        fill="#3B5BDB"/>

  <!-- Listra central que define o eixo de simetria -->
  <path d="M 124 70
           L 132 70
           L 132 210
           L 124 210
           Z"
        fill="#1E2A5E"/>

  <!-- Olhos — dois pontos minimalistas -->
  <circle cx="116" cy="86" r="3.5" fill="#1E2A5E"/>
  <circle cx="140" cy="86" r="3.5" fill="#1E2A5E"/>
</svg>
